name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  analyze:
    name: Analyze and scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=statuses
            -Dsonar.projectName=Statuses
            -Dsonar.sources=lib
            -Dsonar.tests=test
            -Dsonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/.dart_tool/**,build/**
            -Dsonar.test.inclusions=test/**/*_test.dart
            -Dsonar.dart.coverage.reportPaths=coverage/lcov.info

      - name: Quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}